<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="240" height="280">
  <!-- phone body -->
  <rect x="28" y="18" width="64" height="108" rx="11" fill="#3d4e7e"/>
  <rect x="28" y="18" width="64" height="108" rx="11" fill="#fff" opacity="0.05"/>
  <!-- speaker notch -->
  <rect x="52" y="22" width="16" height="3" rx="1.5" fill="#fff" opacity="0.15"/>
  <!-- screen -->
  <rect x="34" y="30" width="52" height="78" rx="5" fill="#fff" opacity="0.16"/>
  <!-- face on screen -->
  <circle cx="49" cy="56" r="3.5" fill="#fff"/>
  <circle cx="71" cy="56" r="3.5" fill="#fff"/>
  <circle cx="50" cy="55" r="1.4" fill="#3d4e7e"/>
  <circle cx="72" cy="55" r="1.4" fill="#3d4e7e"/>
  <path d="M45 76 Q 60 86 75 76" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- platform chat bubbles floating -->
  <g transform="translate(84, 38)">
    <circle cx="0" cy="0" r="8" fill="#e85a3c"/>
    <text x="0" y="3" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle" font-weight="bold">@</text>
  </g>
  <g transform="translate(20, 50)">
    <circle cx="0" cy="0" r="7" fill="#e8a33a"/>
    <text x="0" y="3" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">@</text>
  </g>
  <g transform="translate(90, 72)">
    <circle cx="0" cy="0" r="6.5" fill="#7b9a8d"/>
    <text x="0" y="3" font-family="sans-serif" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">@</text>
  </g>
  <!-- home button line -->
  <rect x="52" y="115" width="16" height="2" rx="1" fill="#fff" opacity="0.5"/>
  <!-- shadow -->
  <ellipse cx="60" cy="132" rx="32" ry="3" fill="#000" opacity="0.07"/>
</svg>
